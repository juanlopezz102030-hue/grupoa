<body>
  <main class="page">
    <section class="card" aria-label="Contacto por WhatsApp">
      <img class="brand-logo" src="assets/cayo-uruguay-logo.png" alt="Logo de CAYO Uruguay" />

      <div class="profile-name" aria-label="Perfil de marca">
        <h1>CAYO Uruguay</h1>
        <img class="verified-badge" src="assets/verified-badge.png" alt="Cuenta verificada" />
      </div>

      <p class="brand">© 2026 CAYO Uruguay.</p>
      <p class="instruction">Hacé click para iniciar la conversación por WhatsApp.</p>

      <a id="whatsappButton" class="button" href="#" target="_blank" rel="noopener noreferrer" aria-label="Chatear por WhatsApp con CAYO Uruguay">
        <img class="button-icon" src="assets/whatsapp-icon.png" alt="" aria-hidden="true" />
        <span>Chatear por WhatsApp</span>

      <nav aria-label="Enlaces legales">
        <a href="politica-de-privacidad.html">Política de Privacidad</a>

      <a class="email" href="mailto:cayo.uruguay@gmail.com">Contacto: cayo.uruguay@gmail.com</a>
    </footer>
  </main>

  <script>
    const phoneNumber = "5516988310528";
    const message = "Hola, quiero iniciar una conversación.";

    function getUTMs(url) {
      const out = {};
      const keys = ["utm_source", "utm_medium", "utm_campaign", "utm_content", "utm_term"];
      try {
        const u = new URL(url);
        keys.forEach((k) => {
          const v = u.searchParams.get(k);
          if (v) out[k] = v;
        });
      } catch (e) {}
      return out;
    }

    function trackWhatsAppClick() {
      try {
        if (typeof window.fbq === "function") {
          window.fbq("trackCustom", "WhatsAppClick", {
            placement: "main_button",
            label: "Chatear por WhatsApp",
            phone_number_id: "numero2",
            page_path: window.location.pathname || "/",
            ...getUTMs(window.location.href)
          });
        }
      } catch (e) {}
    }

    const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
    const whatsappButton = document.getElementById("whatsappButton");
    whatsappButton.href = whatsappUrl;
    whatsappButton.addEventListener("click", function(event) {
      event.preventDefault();
      trackWhatsAppClick();
      setTimeout(function() {
        window.location.href = whatsappUrl;
      }, 650);
    });
  </script>
</body>
